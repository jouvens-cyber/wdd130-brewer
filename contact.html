<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pickles.com | Contact</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header>
        <nav>
            <a class="logo-link" href="index.html">
                <img src="images/logo.png" alt="Pickles.com logo">
            </a>

            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP PICKLES</a></li>
                <li><a href="about.html">ABOUT US</a></li>
                <li><a href="recipes.html">RECIPES</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>

            <form class="search-form">
                <input type="search" placeholder="Search">
            </form>

            <div class="nav-actions">
                <a href="#">Cart</a>
                <a href="#">Profile</a>
            </div>
        </nav>
    </header>

    <main>

        <section class="contact-page">
            <div class="contact-text">
                <h1>CONTACT US</h1>

                <p>
                    Have a question about our pickles, shipping, or your order?
                    Send us a message and we will get back to you.
                </p>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6"></textarea>

                <button type="submit">SEND MESSAGE</button>
            </form>
        </section>

    </main>

    <footer>
        <div class="footer-links">
            <a href="#">FAQ</a>
            <a href="#">Shipping Info</a>
            <a href="contact.html">Contact Us</a>
        </div>

        <form class="newsletter-form">
            <label for="newsletter-email">Email Newsletter</label>

            <input
                type="email"
                id="newsletter-email"
                name="newsletter-email"
                placeholder="Enter your email"
            >

            <button type="submit">SIGN UP</button>
        </form>

        <p>&copy; 2024 Big Dill Pickling. All rights reserved.</p>
    </footer>

</body>
</html>
